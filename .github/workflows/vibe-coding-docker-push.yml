name: vibe-coding Docker Build and Push

on:
  workflow_dispatch:
  push:
    paths:
      - "packaging/docker/**"
      - "requirements/server.txt"
      - "linrouter_core/**"
      - "linrouter_server/**"
      - "web/shared/**"
      - ".github/workflows/vibe-coding-docker-push.yml"
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packaging/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            codeyhj/vibe-coding:latest
          cache-from: type=gha,scope=vibe-coding-dockerfile
          cache-to: type=gha,mode=max,scope=vibe-coding-dockerfile

name: Dockerfile build

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/docker-build.yml"
      - "packaging/docker/**"
      - "requirements/server.txt"
      - "linrouter_core/**"
      - "linrouter_server/**"
      - "web/shared/**"
      - "scripts/ci/verify_build_isolation.py"
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/docker-build.yml"
      - "packaging/docker/**"
      - "requirements/server.txt"
      - "linrouter_core/**"
      - "linrouter_server/**"
      - "web/shared/**"
      - "scripts/ci/verify_build_isolation.py"

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python for boundary verification
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Protect existing Desktop outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/desktop/isolation-guard dist/desktop/isolation-guard
          printf 'desktop-build-sentinel\n' > build/desktop/isolation-guard/artifact.txt
          printf 'desktop-dist-sentinel\n' > dist/desktop/isolation-guard/artifact.txt
          python scripts/ci/verify_build_isolation.py snapshot \
            --output "$RUNNER_TEMP/desktop-boundary.json" \
            build/desktop dist/desktop

      - name: Show Docker version
        run: docker version

      - name: Build isolated Server image
        run: |
          set -euo pipefail
          docker build \
            --file packaging/docker/Dockerfile \
            --tag lin-router:docker-build-test \
            --progress plain \
            .

      - name: Inspect built image
        run: docker image inspect lin-router:docker-build-test >/dev/null

      - name: Verify Docker build preserved Desktop outputs
        if: always()
        run: >-
          python scripts/ci/verify_build_isolation.py verify
          --snapshot "$RUNNER_TEMP/desktop-boundary.json"

  publish:
    name: Build and push Docker Hub image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packaging/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            codeyhj/agent-router:latest
          cache-from: type=gha,scope=agent-router-dockerfile
          cache-to: type=gha,mode=max,scope=agent-router-dockerfile
